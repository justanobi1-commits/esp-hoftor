# ── Versionen ────────────────────────────────────────────────────
# v0.21 |  2026-05-30        |  DI3-Taster-Logik (extern, mit Sperre).
#         - DI3 on_press: wenn DI1=1 (Tor offen) → dauerauf toggeln
#                          wenn DI1=0 → blink_rot_5x (Verweigerung), KEIN Tor öffnen
#         - Begründung Sicherheit: Taster ist von außen zugänglich, darf das Tor
#           NIE selbst öffnen können — nur bestehenden Offen-Zustand „dauerhaft" machen.
#         - Web-Switch `dauerauf` bleibt OHNE Sperre (kommt später hinter Passwort).
# v0.20 |  2026-05-29        |  Feste IP + Stabilitäts-Settings für Ethernet.
#         - manual_ip: 192.168.200.40 (Gateway/DNS = FritzBox 192.168.178.1)
#         - subnet: 255.255.0.0 (/16, FB 5590 nutzt das ganze 192.168.x.x als ein Netz)
#         - Stabilität läuft über api.reboot_timeout: 0s (ethernet hat kein reboot_timeout).
# v0.19 |  2026-05-29        |  LEDs extern schaltbar machen (HA + Web-UI).
#         - r5_led_blau + r6_led_rot: `internal: true` entfernt → als Schalter sichtbar
#         - In grp_led platziert (sorting_weight 1 + 4)
#         - Hinweis: Manuelles Toggle wird bei nächstem Status-Trigger (DI1/Dauerauf-Wechsel)
#           automatisch überschrieben — das ist gewollt (Status hat Vorrang)
# v0.18 |  2026-05-29        |  **LED-Blink-Logik: 5×-Verweigerung + Fehler-Endlos-Blinken.**
#         - Globale Variable g_fehler_aktiv (bool) als Steuerflag
#         - Script blink_rot_5x: 5× rot 300 ms an / 300 ms aus, dann LED-Status-Refresh
#         - Script blink_fehler_start: while g_fehler_aktiv → beide LEDs 500 ms an/aus
#           (endet automatisch wenn Variable false → led_status_refresh)
#         - Script led_status_refresh: stellt blau/rot anhand DI1/dauerauf/ped_halten her
#         - 3 Test-Buttons in Diagnose-Gruppe (Phase-2-Trigger folgen)
# v0.17 |  2026-05-29        |  **LED-Status-Logik (blau + rot, ohne Blink/Fehler).**
#         - r5 (LED blau) auf PCA9554 Pin 4 — physisches Relais F7
#         - r6 (LED rot)  auf PCA9554 Pin 5 — physisches Relais F8
#         - LED blau ON wenn DI1=1 (Tor offen), sonst OFF
#         - LED rot ON wenn dauerauf ODER ped_halten aktiv, sonst OFF
#         - Trigger via on_state (DI1) bzw. on_turn_on/_off (Halte-Schalter)
#         - Boot: beide LEDs initial AUS (werden danach durch erste Statusupdates korrekt)
#         - Neue sorting_group grp_led für die LED-Steuerung
# v0.16 |  2026-05-29        |  **Option B: Auto-Schließ-Trigger von Button auf DI1 umstellen.**
#         - 8× binary_sensor an GPIO4..GPIO11 (INPUT_PULLUP, inverted) als DI1-DI8
#         - DI1 = Status Tor offen (BFT 24 via F3 Koppelrelais)
#         - DI2 = Status Tor zu (BFT 26 via F4 Koppelrelais)
#         - DI3 = Taster Dauerauf (externer Taster, Logik in Phase 2)
#         - DI4-DI8 = Reserve, nur als Sensor verfügbar
#         - DI1 on_press → autoclose_open starten (wenn Dauerauf+Ped AUS und t>0)
#         - DI1 on_release → autoclose_open stoppen (Sicherheit)
#         - Ch1-Öffnen-Button: autoclose_open-Aufruf ENTFERNT — DI1 macht das nun
#         - Damit funktioniert Auto-Close auch bei Öffnung via Funkfernbedienung (ohne ESP-Befehl)
# v0.15 |  2026-05-28        |  Fix Block-Revert: bei gesperrtem Halten sprang der Schalter im
#         Web-UI nicht zurück (publish(false) war No-op bei schon-false Zustand → kein Update).
#         Jetzt im Block-Fall true→false publishen → erzwingt State-Update → Schalter springt zurück.
# v0.14 |  2026-05-28        |  **1-s-Puffer + Block-Logik + Info-Text je Bedienelement.**
#         - Dauerauf/Fußgänger-Dauerauf AUS → Halte-Relais aus, dann nach 1 s Close
#           (gemeinsames restart-Script `hold_close`; Wieder-EIN eines Haltens stoppt es).
#         - Halte-Verriegelung = BLOCKIEREN statt Umschalten: ist ein Dauerauf aktiv, lässt
#           sich der andere nicht einschalten (Versuch → abgelehnt + Log, Schalter springt zurück).
#           Holds sind jetzt optimistic:false + explizites publish; g_switching entfernt.
#         - Je Bedienelement ein eigener „ℹ️"-Info-text_sensor direkt darunter (sorting_weight
#           = Control gerade / Info ungerade). Texte beim Boot gesetzt. Diagnose = 1 Sammeltext.
# v0.13 |  2026-05-28        |  Fix: eindeutige Namen für Info-text_sensors.
# v0.12 |  2026-05-28        |  Erklärungs-/Hilfetexte je Gruppe.
# v0.11 |  2026-05-28        |  Diagnose: Chip-Temp, ESPHome-Version, Verbindungsstatus.
# v0.10 |  2026-05-28        |  Fix Log-Spam: Status event-getrieben.
# v0.7-0.9 |  2026-05-28     |  Buttons (1 s Impuls), Dauerauf/Ped-halten, Auto-Schließen, Sperren, LCARS v3, Status-Punkte.
# v0.1-0.6 |  2026-05-28     |  Grundgerüst Ethernet/API/OTA, 4 Kanäle, web_server v3, Icons, LCARS.
# ─────────────────────────────────────────────────────────────────
#
#  Hoftor-Steuerung — Waveshare ESP32-S3-POE-ETH-8DI-8RO
#  BFT Thalia BT A80/A160 + EBD.  Doku: esp/hoftor/CLAUDE.md
#  Relais: r1=Open(BFT65) r2=Close(BFT62) r3=Schritt(BFT64) r4=Ped(BFT61, IC=6 Timer Ped)
#  TCA aus → ESP schließt aktiv.  ⚠️ Erst-Flash USB-C, danach OTA.  Ethernet XOR WiFi.

esphome:
  name: hoftor
  friendly_name: "Hoftor"
  on_boot:
    priority: -100
    then:
      # Status-Punkte initialisieren
      - text_sensor.template.publish: { id: st_r1, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r2, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r3, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r4, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r5, state: "⚫ aus" }
      - text_sensor.template.publish: { id: st_r6, state: "⚫ aus" }
      # Halte-Schalter (optimistic:false) auf AUS setzen
      - switch.template.publish: { id: dauerauf, state: false }
      - switch.template.publish: { id: ped_halten, state: false }
      # Info-Texte je Bedienelement
      - text_sensor.template.publish:
          id: i_r1
          state: "Grünes Symbol: aktiv · rotes Symbol: Ruhezustand."
      - text_sensor.template.publish:
          id: i_open
          state: "Öffnet beide Torflügel."
      - text_sensor.template.publish:
          id: i_dauer
          state: "Öffnet beide Torflügel und hält diese offen, bis deaktiviert."
      - text_sensor.template.publish:
          id: i_ac1
          state: "Tor schließt automatisch nach der eingestellten Zeit (0 = aus)."
      - text_sensor.template.publish:
          id: i_r2
          state: "Grünes Symbol: aktiv · rotes Symbol: Ruhezustand."
      - text_sensor.template.publish:
          id: i_close
          state: "Schließt beide Torflügel."
      - text_sensor.template.publish:
          id: i_r3
          state: "Grünes Symbol: aktiv · rotes Symbol: Ruhezustand."
      - text_sensor.template.publish:
          id: i_step
          state: "Jeder Druck wechselt: öffnen → stoppen → schließen."
      - text_sensor.template.publish:
          id: i_r4
          state: "Grünes Symbol: aktiv · rotes Symbol: Ruhezustand."
      - text_sensor.template.publish:
          id: i_ped
          state: "Öffnet nur einen Torflügel."
      - text_sensor.template.publish:
          id: i_pedhold
          state: "Öffnet einen Torflügel und hält ihn offen, bis deaktiviert. „Öffnen“ bleibt möglich — das Tor fährt danach wieder in die Fußgänger-Position zurück."
      - text_sensor.template.publish:
          id: i_ac4
          state: "Tor schließt automatisch nach der eingestellten Zeit (0 = aus)."
      - text_sensor.template.publish:
          id: i_diag
          state: "Geräte-Status und Netzwerk-Infos."
      # LED-Info-Texte
      - text_sensor.template.publish:
          id: i_led_blau
          state: "🔵 LED blau leuchtet wenn das Tor in der Endlage „offen“ steht."
      - text_sensor.template.publish:
          id: i_led_rot
          state: "🔴 LED rot leuchtet wenn Dauerauf oder Fußgänger-Dauerauf aktiv ist."

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

ethernet:
  type: W5500
  clk_pin: GPIO15
  mosi_pin: GPIO13
  miso_pin: GPIO14
  cs_pin: GPIO16
  interrupt_pin: GPIO12
  # Hinweis: ethernet hat KEIN reboot_timeout (nur api/wifi). Stabilität läuft über api.reboot_timeout: 0s.
  manual_ip:
    static_ip: 192.168.200.40
    gateway:   192.168.178.1     # FritzBox 5590
    subnet:    255.255.0.0       # /16 — alle 192.168.x.x im selben Netz
    dns1:      192.168.178.1     # FritzBox als DNS

web_server:
  port: 80
  version: 3
  log: true
  css_include: hoftor_lcars.css
  sorting_groups:
    - id: grp_ch1
      name: "Ch1 — Tor auf"
      sorting_weight: 10
    - id: grp_ch2
      name: "Ch2 — Tor zu"
      sorting_weight: 20
    - id: grp_ch3
      name: "Ch3 — auf-stopp-zu"
      sorting_weight: 30
    - id: grp_ch4
      name: "Ch4 — Fußgänger (Ped)"
      sorting_weight: 40
    - id: grp_led
      name: "LEDs (F7 blau / F8 rot)"
      sorting_weight: 70
    - id: grp_input
      name: "Eingänge (DI1-DI8)"
      sorting_weight: 80
    - id: grp_diag
      name: "Diagnose"
      sorting_weight: 90

i2c:
  sda: GPIO42
  scl: GPIO41
  frequency: 100kHz
  scan: true

pca9554:
  - id: relay_hub
    address: 0x20

# ── Interne Relais (PCA9554 Pin 0-3) — publishen Status bei Schaltvorgang ─
switch:
  - platform: gpio
    name: "relay_open"
    id: r1
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 0, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r1, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r1, state: "🔴 aus" }
  - platform: gpio
    name: "relay_close"
    id: r2
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 1, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r2, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r2, state: "🔴 aus" }
  - platform: gpio
    name: "relay_step"
    id: r3
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 2, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r3, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r3, state: "🔴 aus" }
  - platform: gpio
    name: "relay_ped"
    id: r4
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 3, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r4, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r4, state: "🔴 aus" }

  # ── LED-Relais r5 (blau, F7) + r6 (rot, F8) ─────────────────────
  # Werden automatisch über Status-Logik gesteuert:
  #   blau: ON wenn DI1=1 (Tor offen)
  #   rot:  ON wenn dauerauf ODER ped_halten aktiv
  # PLUS extern schaltbar in HA + Web-UI (für Diagnose/Override).
  # Manuelles Toggle wird beim nächsten Status-Trigger automatisch überschrieben.
  - platform: gpio
    name: "LED blau"
    id: r5_led_blau
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 4, mode: { output: true } }
    icon: "mdi:lightbulb"
    web_server: { sorting_group_id: grp_led, sorting_weight: 1 }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r5, state: "🔵 leuchtet" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r5, state: "⚫ aus" }

  - platform: gpio
    name: "LED rot"
    id: r6_led_rot
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 5, mode: { output: true } }
    icon: "mdi:lightbulb"
    web_server: { sorting_group_id: grp_led, sorting_weight: 4 }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r6, state: "🔴 leuchtet" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r6, state: "⚫ aus" }

  # ── Dauerauf (hält r1) — blockiert wenn Fußgänger Dauerauf aktiv ─
  - platform: template
    name: "Ch1 — Dauerauf"
    id: dauerauf
    icon: "mdi:gate-open"
    optimistic: false
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 4
    turn_on_action:
      - if:
          condition:
            switch.is_on: ped_halten
          then:
            - logger.log:
                level: INFO
                format: "Dauerauf gesperrt — erst Fußgänger Dauerauf ausschalten"
            # true→false erzwingt ein State-Update, sonst springt der Web-Schalter nicht zurück
            - switch.template.publish: { id: dauerauf, state: true }
            - switch.template.publish: { id: dauerauf, state: false }
          else:
            - script.stop: hold_close
            - script.stop: autoclose_open
            - logger.log:
                level: INFO
                format: "Dauerauf EIN → Tor offen halten (r1 dauerhaft)"
            - switch.turn_on: r1
            - switch.turn_on: r6_led_rot     # LED rot AN
            - switch.template.publish: { id: dauerauf, state: true }
    turn_off_action:
      - switch.turn_off: r1
      # LED rot nur AUS wenn auch ped_halten AUS
      - if:
          condition:
            switch.is_off: ped_halten
          then:
            - switch.turn_off: r6_led_rot
      - switch.template.publish: { id: dauerauf, state: false }
      - logger.log:
          level: INFO
          format: "Dauerauf AUS → Close in 1 s"
      - script.execute: hold_close

  # ── Fußgänger Dauerauf (hält r4) — blockiert wenn Dauerauf aktiv ─
  - platform: template
    name: "Ch4 — Fußgänger Dauerauf"
    id: ped_halten
    icon: "mdi:walk"
    optimistic: false
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 4
    turn_on_action:
      - if:
          condition:
            switch.is_on: dauerauf
          then:
            - logger.log:
                level: INFO
                format: "Fußgänger Dauerauf gesperrt — erst Dauerauf ausschalten"
            # true→false erzwingt ein State-Update, sonst springt der Web-Schalter nicht zurück
            - switch.template.publish: { id: ped_halten, state: true }
            - switch.template.publish: { id: ped_halten, state: false }
          else:
            - script.stop: hold_close
            - script.stop: autoclose_ped
            - logger.log:
                level: INFO
                format: "Fußgänger Dauerauf EIN → ein Flügel offen halten (r4 dauerhaft)"
            - switch.turn_on: r4
            - switch.turn_on: r6_led_rot     # LED rot AN
            - switch.template.publish: { id: ped_halten, state: true }
    turn_off_action:
      - switch.turn_off: r4
      # LED rot nur AUS wenn auch dauerauf AUS
      - if:
          condition:
            switch.is_off: dauerauf
          then:
            - switch.turn_off: r6_led_rot
      - switch.template.publish: { id: ped_halten, state: false }
      - logger.log:
          level: INFO
          format: "Fußgänger Dauerauf AUS → Close in 1 s"
      - script.execute: hold_close

# ── Auto-Schließ-Zeiten (0 = aus) ────────────────────────────────
number:
  - platform: template
    name: "Ch1 — Auto-Schließ-Zeit"
    id: t_autoclose_open
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 600
    step: 1
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    mode: box
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 6
  - platform: template
    name: "Ch4 — Auto-Schließ-Zeit"
    id: t_autoclose_ped
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 600
    step: 1
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    mode: box
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 6

# ── Befehls-Buttons (fix 1 s Impuls) ─────────────────────────────
button:
  - platform: template
    name: "Ch1 — Öffnen"
    icon: "mdi:gate-open"
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 2
    on_press:
      - if:
          condition:
            switch.is_off: dauerauf
          then:
            - logger.log:
                level: INFO
                format: "Ch1 (Tor auf): Öffnen-Impuls"
            - script.execute: pulse_open
            # Auto-Close-Trigger: NICHT mehr hier — wird von DI1 (Tor offen erreicht) gestartet (Option B v0.16)
          else:
            - logger.log:
                level: INFO
                format: "Ch1: Öffnen gesperrt (Dauerauf aktiv)"

  - platform: template
    name: "Ch2 — Schließen"
    icon: "mdi:gate"
    web_server:
      sorting_group_id: grp_ch2
      sorting_weight: 2
    on_press:
      - if:
          condition:
            and:
              - switch.is_off: dauerauf
              - switch.is_off: ped_halten
          then:
            - script.stop: autoclose_open
            - script.stop: autoclose_ped
            - logger.log:
                level: INFO
                format: "Ch2 (Tor zu): Schließen-Impuls"
            - script.execute: pulse_close
          else:
            - logger.log:
                level: INFO
                format: "Ch2: Schließen gesperrt (Halten aktiv)"

  - platform: template
    name: "Ch3 — auf-stopp-zu"
    icon: "mdi:gate-arrow-right"
    web_server:
      sorting_group_id: grp_ch3
      sorting_weight: 2
    on_press:
      - if:
          condition:
            and:
              - switch.is_off: dauerauf
              - switch.is_off: ped_halten
          then:
            - script.stop: autoclose_open
            - script.stop: autoclose_ped
            - logger.log:
                level: INFO
                format: "Ch3 (auf-stopp-zu): Impuls"
            - script.execute: pulse_step
          else:
            - logger.log:
                level: INFO
                format: "Ch3: auf-stopp-zu gesperrt (Halten aktiv)"

  - platform: template
    name: "Ch4 — Fußgänger"
    icon: "mdi:walk"
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 2
    on_press:
      - if:
          condition:
            and:
              - switch.is_off: dauerauf
              - switch.is_off: ped_halten
          then:
            - logger.log:
                level: INFO
                format: "Ch4 (Ped): Fußgänger-Impuls"
            - script.execute: pulse_ped
            - if:
                condition:
                  lambda: 'return id(t_autoclose_ped).state > 0;'
                then:
                  - script.execute: autoclose_ped
          else:
            - logger.log:
                level: INFO
                format: "Ch4: Fußgänger gesperrt (Halten aktiv)"

  # ── Test-Buttons für LED-Blink-Patterns (Diagnose-Gruppe) ──────
  - platform: template
    name: "Test: LED rot 5× blinken"
    icon: "mdi:lightbulb-alert"
    web_server: { sorting_group_id: grp_diag, sorting_weight: 10 }
    on_press:
      - logger.log:
          level: INFO
          format: "Test: 5× rot-Blink ausgelöst"
      - script.execute: blink_rot_5x

  - platform: template
    name: "Test: Fehler-Blinken EIN"
    icon: "mdi:alert-circle"
    web_server: { sorting_group_id: grp_diag, sorting_weight: 11 }
    on_press:
      - logger.log:
          level: INFO
          format: "Test: Fehler-Blinken EIN"
      - lambda: 'id(g_fehler_aktiv) = true;'
      - script.execute: blink_fehler_start

  - platform: template
    name: "Test: Fehler-Blinken AUS"
    icon: "mdi:alert-circle-check"
    web_server: { sorting_group_id: grp_diag, sorting_weight: 12 }
    on_press:
      - logger.log:
          level: INFO
          format: "Test: Fehler-Blinken AUS"
      - lambda: 'id(g_fehler_aktiv) = false;'

# ── Globale Variablen (Status-Flags für Logik) ──────────────────
globals:
  - id: g_fehler_aktiv
    type: bool
    restore_value: no
    initial_value: 'false'

# ── Scripts: feste 1 s Impulse + Auto-Schließen + Halten-Puffer ──
script:
  - id: pulse_open
    mode: restart
    then:
      - switch.turn_on: r1
      - delay: 1s
      - switch.turn_off: r1
  - id: pulse_close
    mode: restart
    then:
      - switch.turn_on: r2
      - delay: 1s
      - switch.turn_off: r2
  - id: pulse_step
    mode: restart
    then:
      - switch.turn_on: r3
      - delay: 1s
      - switch.turn_off: r3
  - id: pulse_ped
    mode: restart
    then:
      - switch.turn_on: r4
      - delay: 1s
      - switch.turn_off: r4

  # 1-s-Puffer nach Dauerauf/Fußgänger-Dauerauf AUS → dann Close.
  # restart: wird ein Halten innerhalb der 1 s wieder aktiviert, stoppt es den Puffer.
  - id: hold_close
    mode: restart
    then:
      - delay: 1s
      - logger.log:
          level: INFO
          format: "Halten-Puffer (1 s) abgelaufen → Close"
      - script.execute: pulse_close

  - id: autoclose_open
    mode: restart
    then:
      - delay: !lambda 'return (uint32_t)(id(t_autoclose_open).state * 1000);'
      - logger.log:
          level: INFO
          format: "Ch1 (Tor auf): Auto-Schließ-Zeit abgelaufen → Close"
      - script.execute: pulse_close
  - id: autoclose_ped
    mode: restart
    then:
      - delay: !lambda 'return (uint32_t)(id(t_autoclose_ped).state * 1000);'
      - logger.log:
          level: INFO
          format: "Ch4 (Ped): Auto-Schließ-Zeit abgelaufen → Close"
      - script.execute: pulse_close

  # ── LED-Helper-Scripts (v0.18) ────────────────────────────────
  # Stellt blau/rot anhand DI1 / dauerauf / ped_halten her.
  # Wird nach Blink-Pattern aufgerufen, damit LEDs den korrekten Normalzustand zeigen.
  - id: led_status_refresh
    mode: single
    then:
      # LED blau: an wenn DI1=1, sonst aus
      - if:
          condition:
            binary_sensor.is_on: di1_tor_offen
          then:
            - switch.turn_on: r5_led_blau
          else:
            - switch.turn_off: r5_led_blau
      # LED rot: an wenn dauerauf ODER ped_halten, sonst aus
      - if:
          condition:
            or:
              - switch.is_on: dauerauf
              - switch.is_on: ped_halten
          then:
            - switch.turn_on: r6_led_rot
          else:
            - switch.turn_off: r6_led_rot

  # 5× LED rot blinken (300 ms an / 300 ms aus) → dann Normalstatus wiederherstellen
  # Verwendung: bei Befehls-Verweigerung (Phase 2: Taster oder Schalter-Sperre)
  - id: blink_rot_5x
    mode: restart      # bei erneutem Aufruf von vorne starten
    then:
      - repeat:
          count: 5
          then:
            - switch.turn_on: r6_led_rot
            - delay: 300ms
            - switch.turn_off: r6_led_rot
            - delay: 300ms
      - script.execute: led_status_refresh
      - logger.log:
          level: INFO
          format: "LED rot 5× blinken beendet → Status refresh"

  # Fehler-Endlos-Blinken beider LEDs (500 ms an / 500 ms aus)
  # Solange g_fehler_aktiv == true → blinkt weiter.
  # Stoppen: g_fehler_aktiv = false; script läuft max. 1 s zu Ende → refresh.
  - id: blink_fehler_start
    mode: restart
    then:
      - logger.log:
          level: INFO
          format: "Fehler-Blinken gestartet (beide LEDs)"
      - while:
          condition:
            lambda: 'return id(g_fehler_aktiv);'
          then:
            - switch.turn_on: r5_led_blau
            - switch.turn_on: r6_led_rot
            - delay: 500ms
            - switch.turn_off: r5_led_blau
            - switch.turn_off: r6_led_rot
            - delay: 500ms
      - logger.log:
          level: INFO
          format: "Fehler-Blinken beendet → Status refresh"
      - script.execute: led_status_refresh

# ── Eingänge (DI1-DI8 an GPIO4-GPIO11, INPUT_PULLUP, inverted) ──
# DI1 = Status Tor offen   (BFT 24 via Phoenix RIF-0 F3) → Auto-Close-Trigger
# DI2 = Status Tor zu      (BFT 26 via Phoenix RIF-0 F4)
# DI3 = Taster Dauerauf    (externer Taster) — Logik in Phase 2
# DI4-DI8 = Reserve
binary_sensor:
  - platform: gpio
    name: "DI1 — Tor offen"
    id: di1_tor_offen
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    device_class: opening
    filters:
      - delayed_on: 50ms
      - delayed_off: 100ms
    web_server: { sorting_group_id: grp_input, sorting_weight: 1 }
    on_press:
      # Trigger: DI1 wechselt von 0 → 1 (Tor erreicht Endlage offen)
      # Option B: Auto-Close-Timer hier starten (statt am Button)
      # + LED blau (r5) einschalten
      then:
        - logger.log:
            level: INFO
            format: "DI1: Tor erreicht Endlage offen"
        - switch.turn_on: r5_led_blau
        - if:
            condition:
              and:
                - switch.is_off: dauerauf
                - switch.is_off: ped_halten
            then:
              - if:
                  condition:
                    lambda: 'return id(t_autoclose_open).state > 0;'
                  then:
                    - logger.log:
                        level: INFO
                        format: "DI1 → autoclose_open gestartet"
                    - script.execute: autoclose_open
            else:
              - logger.log:
                  level: INFO
                  format: "DI1 → autoclose_open NICHT gestartet (Halten aktiv)"
    on_release:
      # Trigger: DI1 wechselt von 1 → 0 (Tor verlässt Endlage offen)
      # + LED blau (r5) ausschalten
      then:
        - logger.log:
            level: INFO
            format: "DI1: Tor verlässt Endlage offen → autoclose_open gestoppt"
        - switch.turn_off: r5_led_blau
        - script.stop: autoclose_open

  - platform: gpio
    name: "DI2 — Tor zu"
    id: di2_tor_zu
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    device_class: opening
    filters:
      - delayed_on: 50ms
      - delayed_off: 100ms
    web_server: { sorting_group_id: grp_input, sorting_weight: 2 }
    on_press:
      then:
        - logger.log:
            level: INFO
            format: "DI2: Tor erreicht Endlage zu"

  - platform: gpio
    name: "DI3 — Taster Dauerauf"
    id: di3_taster
    pin:
      number: GPIO6
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    web_server: { sorting_group_id: grp_input, sorting_weight: 3 }
    # v0.21: Toggle Dauerauf NUR wenn Tor bereits offen (DI1=1).
    # Sicherheit: Taster ist von außen zugänglich → darf das Tor NICHT öffnen.
    # Bei Verweigerung: 5× rot blinken, keine Aktion am Tor.
    on_press:
      then:
        - if:
            condition:
              binary_sensor.is_on: di1_tor_offen
            then:
              - logger.log:
                  level: INFO
                  format: "DI3 (Taster): Tor offen → Dauerauf togglen"
              - switch.toggle: dauerauf
            else:
              - logger.log:
                  level: WARN
                  format: "DI3 (Taster) VERWEIGERT — Tor nicht offen (Sicherheit: kein Öffnen via Taster)"
              - script.execute: blink_rot_5x

  - platform: gpio
    name: "DI4"
    id: di4
    pin: { number: GPIO7, mode: INPUT_PULLUP, inverted: true }
    web_server: { sorting_group_id: grp_input, sorting_weight: 4 }

  - platform: gpio
    name: "DI5"
    id: di5
    pin: { number: GPIO8, mode: INPUT_PULLUP, inverted: true }
    web_server: { sorting_group_id: grp_input, sorting_weight: 5 }

  - platform: gpio
    name: "DI6"
    id: di6
    pin: { number: GPIO9, mode: INPUT_PULLUP, inverted: true }
    web_server: { sorting_group_id: grp_input, sorting_weight: 6 }

  - platform: gpio
    name: "DI7"
    id: di7
    pin: { number: GPIO10, mode: INPUT_PULLUP, inverted: true }
    web_server: { sorting_group_id: grp_input, sorting_weight: 7 }

  - platform: gpio
    name: "DI8"
    id: di8
    pin: { number: GPIO11, mode: INPUT_PULLUP, inverted: true }
    web_server: { sorting_group_id: grp_input, sorting_weight: 8 }

