# ── Versionen ────────────────────────────────────────────────────
# v0.12 |  2026-05-28        |  Erklärungs-/Hilfetexte je Gruppe (text_sensor „ℹ️ Info",
#         beim Boot einmalig gesetzt → kein Poll). Unten in jeder Kanal-/Diagnose-Karte.
# v0.11 |  2026-05-28        |  Diagnose erweitert: Chip-Temperatur (internal_temperature, 60s),
#         ESPHome-Version (text_sensor version), Verbindungsstatus (binary_sensor status).
# v0.10 |  2026-05-28        |  **Fix Log-Spam:** Status-Punkt nicht mehr per 250-ms-Poll,
#         sondern EVENT-getrieben — r1-r4 publishen 🟢/🔴 nur bei tatsächlichem Schalten
#         (on_turn_on/on_turn_off). Init via on_boot (alle 🔴 aus). Kein dauerndes Re-Publish.
# v0.9  |  2026-05-28        |  Status-Anzeige je Kanal (Emoji 🟢/🔴) — ABER 250-ms-Poll = Spam (→ v0.10).
# v0.8  |  2026-05-28        |  Button-Sperren bei aktivem Halten + Rename Ch4.
# v0.7  |  2026-05-28        |  Buttons (fix 1 s Impuls) + Dauerauf/Ped-halten + Auto-Schließen.
# v0.6  |  2026-05-28        |  LCARS-Farben via css_include (hoftor_lcars.css).
# v0.5  |  2026-05-28        |  Icons je Kanal.
# v0.4  |  2026-05-28        |  web_server v3 + Gruppen pro Kanal.
# v0.3  |  2026-05-28        |  Lesbarer Bedien-Log (INFO).
# v0.2  |  2026-05-28        |  4 Kanäle (R1-R4 via PCA9554@0x20).
# v0.1  |  2026-05-28        |  Grundgerüst: Ethernet (W5500), API, OTA, web_server.
# ─────────────────────────────────────────────────────────────────
#
#  Hoftor-Steuerung — Waveshare ESP32-S3-POE-ETH-8DI-8RO
#  BFT Thalia BT A80/A160 + EBD.  Doku: esp/hoftor/CLAUDE.md
#  Relais-Mapping: r1=Open(BFT65) r2=Close(BFT62) r3=Schritt(BFT64) r4=Ped(BFT61, IC=6 Timer Ped)
#  TCA aus → ESP schließt aktiv.  ⚠️ Erst-Flash USB-C, danach OTA.  Ethernet XOR WiFi.

esphome:
  name: hoftor
  friendly_name: "Hoftor"
  on_boot:
    priority: -100
    then:
      - text_sensor.template.publish: { id: st_r1, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r2, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r3, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r4, state: "🔴 aus" }
      - text_sensor.template.publish:
          id: st_info_ch1
          state: "Öffnen: 1-s-Impuls (Tor auf). Dauerauf: hält offen, AUS schließt aktiv. Auto-Schließ-Zeit: 0=aus, sonst Close nach X s. Punkt: 🟢=an / 🔴=aus."
      - text_sensor.template.publish:
          id: st_info_ch2
          state: "Schließen: 1-s-Impuls (Tor zu)."
      - text_sensor.template.publish:
          id: st_info_ch3
          state: "1-s-Impuls, Schritt — jeder Druck: auf → stopp → zu."
      - text_sensor.template.publish:
          id: st_info_ch4
          state: "Fußgänger: öffnet nur EINEN Flügel. Fußgänger Dauerauf: hält diesen offen. „Öffnen“ (Ch1-Button od. Funk) öffnet dabei das GANZE Tor (beide Flügel, Auto kann durch) → danach autom. zurück auf Fußgänger. Auto-Schließ-Zeit: 0=aus."
      - text_sensor.template.publish:
          id: st_info_diag
          state: "Verbindung zu HA, Laufzeit, Chip-Temp, IP/MAC, Firmware."

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

ethernet:
  type: W5500
  clk_pin: GPIO15
  mosi_pin: GPIO13
  miso_pin: GPIO14
  cs_pin: GPIO16
  interrupt_pin: GPIO12

web_server:
  port: 80
  version: 3
  log: true
  css_include: hoftor_lcars.css
  sorting_groups:
    - id: grp_ch1
      name: "Ch1 — Tor auf"
      sorting_weight: 10
    - id: grp_ch2
      name: "Ch2 — Tor zu"
      sorting_weight: 20
    - id: grp_ch3
      name: "Ch3 — auf-stopp-zu"
      sorting_weight: 30
    - id: grp_ch4
      name: "Ch4 — Fußgänger (Ped)"
      sorting_weight: 40
    - id: grp_diag
      name: "Diagnose"
      sorting_weight: 90

i2c:
  sda: GPIO42
  scl: GPIO41
  frequency: 100kHz
  scan: true

pca9554:
  - id: relay_hub
    address: 0x20

globals:
  - id: g_switching
    type: bool
    restore_value: no
    initial_value: 'false'

# ── Interne Relais (PCA9554 Pin 0-3) — publishen Status bei Schaltvorgang ─
switch:
  - platform: gpio
    name: "relay_open"
    id: r1
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 0, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r1, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r1, state: "🔴 aus" }
  - platform: gpio
    name: "relay_close"
    id: r2
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 1, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r2, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r2, state: "🔴 aus" }
  - platform: gpio
    name: "relay_step"
    id: r3
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 2, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r3, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r3, state: "🔴 aus" }
  - platform: gpio
    name: "relay_ped"
    id: r4
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 3, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r4, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r4, state: "🔴 aus" }

  # ── Dauerauf (hält r1 = Open) ──────────────────────────────────
  - platform: template
    name: "Ch1 — Dauerauf"
    id: dauerauf
    icon: "mdi:gate-open"
    optimistic: true
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 2
    turn_on_action:
      - lambda: 'id(g_switching) = true;'
      - switch.turn_off: ped_halten
      - lambda: 'id(g_switching) = false;'
      - script.stop: autoclose_open
      - logger.log:
          level: INFO
          format: "Dauerauf EIN → Tor offen halten (r1 dauerhaft)"
      - switch.turn_on: r1
    turn_off_action:
      - switch.turn_off: r1
      - if:
          condition:
            lambda: 'return !id(g_switching);'
          then:
            - logger.log:
                level: INFO
                format: "Dauerauf AUS → aktiv schließen (Close-Impuls)"
            - script.execute: pulse_close

  # ── Fußgänger Dauerauf (hält r4 = Ped) — BFT-Klemme 61 = IC=6 Timer Ped ─
  - platform: template
    name: "Ch4 — Fußgänger Dauerauf"
    id: ped_halten
    icon: "mdi:walk"
    optimistic: true
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 2
    turn_on_action:
      - lambda: 'id(g_switching) = true;'
      - switch.turn_off: dauerauf
      - lambda: 'id(g_switching) = false;'
      - script.stop: autoclose_ped
      - logger.log:
          level: INFO
          format: "Fußgänger Dauerauf EIN → ein Flügel offen halten (r4 dauerhaft)"
      - switch.turn_on: r4
    turn_off_action:
      - switch.turn_off: r4
      - if:
          condition:
            lambda: 'return !id(g_switching);'
          then:
            - logger.log:
                level: INFO
                format: "Fußgänger Dauerauf AUS → aktiv schließen (Close-Impuls)"
            - script.execute: pulse_close

# ── Auto-Schließ-Zeiten (0 = aus) ────────────────────────────────
number:
  - platform: template
    name: "Ch1 — Auto-Schließ-Zeit"
    id: t_autoclose_open
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 600
    step: 1
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    mode: box
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 3
  - platform: template
    name: "Ch4 — Auto-Schließ-Zeit"
    id: t_autoclose_ped
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 600
    step: 1
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    mode: box
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 3

# ── Befehls-Buttons (fix 1 s Impuls) ─────────────────────────────
button:
  - platform: template
    name: "Ch1 — Öffnen"
    icon: "mdi:gate-open"
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 1
    on_press:
      - if:
          condition:
            switch.is_off: dauerauf
          then:
            - logger.log:
                level: INFO
                format: "Ch1 (Tor auf): Öffnen-Impuls"
            - script.execute: pulse_open
            - if:
                condition:
                  lambda: 'return id(t_autoclose_open).state > 0;'
                then:
                  - script.execute: autoclose_open
          else:
            - logger.log:
                level: INFO
                format: "Ch1: Öffnen gesperrt (Dauerauf aktiv)"

  - platform: template
    name: "Ch2 — Schließen"
    icon: "mdi:gate"
    web_server:
      sorting_group_id: grp_ch2
      sorting_weight: 1
    on_press:
      - if:
          condition:
            and:
              - switch.is_off: dauerauf
              - switch.is_off: ped_halten
          then:
            - script.stop: autoclose_open
            - script.stop: autoclose_ped
            - logger.log:
                level: INFO
                format: "Ch2 (Tor zu): Schließen-Impuls"
            - script.execute: pulse_close
          else:
            - logger.log:
                level: INFO
                format: "Ch2: Schließen gesperrt (Halten aktiv)"

  - platform: template
    name: "Ch3 — auf-stopp-zu"
    icon: "mdi:gate-arrow-right"
    web_server:
      sorting_group_id: grp_ch3
      sorting_weight: 1
    on_press:
      - if:
          condition:
            and:
              - switch.is_off: dauerauf
              - switch.is_off: ped_halten
          then:
            - script.stop: autoclose_open
            - script.stop: autoclose_ped
            - logger.log:
                level: INFO
                format: "Ch3 (auf-stopp-zu): Impuls"
            - script.execute: pulse_step
          else:
            - logger.log:
                level: INFO
                format: "Ch3: auf-stopp-zu gesperrt (Halten aktiv)"

  - platform: template
    name: "Ch4 — Fußgänger"
    icon: "mdi:walk"
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 1
    on_press:
      - if:
          condition:
            and:
              - switch.is_off: dauerauf
              - switch.is_off: ped_halten
          then:
            - logger.log:
                level: INFO
                format: "Ch4 (Ped): Fußgänger-Impuls"
            - script.execute: pulse_ped
            - if:
                condition:
                  lambda: 'return id(t_autoclose_ped).state > 0;'
                then:
                  - script.execute: autoclose_ped
          else:
            - logger.log:
                level: INFO
                format: "Ch4: Fußgänger gesperrt (Halten aktiv)"

# ── Scripts: feste 1 s Impulse + Auto-Schließen ──────────────────
script:
  - id: pulse_open
    mode: restart
    then:
      - switch.turn_on: r1
      - delay: 1s
      - switch.turn_off: r1
  - id: pulse_close
    mode: restart
    then:
      - switch.turn_on: r2
      - delay: 1s
      - switch.turn_off: r2
  - id: pulse_step
    mode: restart
    then:
      - switch.turn_on: r3
      - delay: 1s
      - switch.turn_off: r3
  - id: pulse_ped
    mode: restart
    then:
      - switch.turn_on: r4
      - delay: 1s
      - switch.turn_off: r4

  - id: autoclose_open
    mode: restart
    then:
      - delay: !lambda 'return (uint32_t)(id(t_autoclose_open).state * 1000);'
      - logger.log:
          level: INFO
          format: "Ch1 (Tor auf): Auto-Schließ-Zeit abgelaufen → Close"
      - script.execute: pulse_close
  - id: autoclose_ped
    mode: restart
    then:
      - delay: !lambda 'return (uint32_t)(id(t_autoclose_ped).state * 1000);'
      - logger.log:
          level: INFO
          format: "Ch4 (Ped): Auto-Schließ-Zeit abgelaufen → Close"
      - script.execute: pulse_close

# ── Diagnose ─────────────────────────────────────────────────────
binary_sensor:
  - platform: status
    name: "Verbindung (API)"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 6

sensor:
  - platform: uptime
    name: "Uptime"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 1
  - platform: internal_temperature
    name: "Chip-Temperatur"
    update_interval: 60s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 4

text_sensor:
  # ── Status-Punkt je Kanal (event-getrieben, kein Poll) ─────────
  - platform: template
    name: "Ch1 — Relais"
    id: st_r1
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 0
  - platform: template
    name: "Ch2 — Relais"
    id: st_r2
    web_server:
      sorting_group_id: grp_ch2
      sorting_weight: 0
  - platform: template
    name: "Ch3 — Relais"
    id: st_r3
    web_server:
      sorting_group_id: grp_ch3
      sorting_weight: 0
  - platform: template
    name: "Ch4 — Relais"
    id: st_r4
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 0

  # ── Erklärungs-/Hilfetexte je Gruppe (beim Boot gesetzt) ───────
  - platform: template
    name: "ℹ️ Info"
    id: st_info_ch1
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 9
  - platform: template
    name: "ℹ️ Info"
    id: st_info_ch2
    web_server:
      sorting_group_id: grp_ch2
      sorting_weight: 9
  - platform: template
    name: "ℹ️ Info"
    id: st_info_ch3
    web_server:
      sorting_group_id: grp_ch3
      sorting_weight: 9
  - platform: template
    name: "ℹ️ Info"
    id: st_info_ch4
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 9
  - platform: template
    name: "ℹ️ Info"
    id: st_info_diag
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 9

  - platform: ethernet_info
    ip_address:
      name: "IP-Adresse"
      web_server:
        sorting_group_id: grp_diag
        sorting_weight: 2
    mac_address:
      name: "MAC-Adresse"
      web_server:
        sorting_group_id: grp_diag
        sorting_weight: 3

  - platform: version
    name: "ESPHome-Version"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 5

