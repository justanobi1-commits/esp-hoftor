# ── Versionen ────────────────────────────────────────────────────
# v0.36 |  2026-06-19        |  **DI4/DI5 → Funk-Empfänger Hörmann HET/S 24 (Kanal 1/2), reine Melder.**
#         DI4/DI5 von "Reserve" auf "Funk Hörmann K1/K2" umbenannt. HET/S 24 (BiSecur-Externempfänger)
#         im FIBOX, aus 24 V versorgt; potenzialfreier Relaiskontakt schaltet +24 V auf den DI —
#         elektrisch identisch zum F3/F4-Status-Schema. BEWUSST ohne on_press: alle Schalt-Logik
#         liegt in HA (Automation auf binary_sensor.hoftor_funk_hormann_k1/_k2) → ohne Re-Flash umlegbar.
#         DI6-DI8 bleiben Reserve. (Verdrahtung: COM=+24 V (R-Block), NO=DI-Klemme; DI-COM=GND vorhanden.)
# v0.35 |  2026-06-01        |  **Bedien-Anleitung umgezogen: von Entities (grp_hilfe) → JS-Injektion über dem Log.**
#         grp_hilfe + 6 hlp_-text_sensor + on_boot-Publishes wieder entfernt.
#         Neue Datei `hoftor_help.js` via `web_server: js_include` (wird als /0.js zusätzlich
#         zum Frontend geladen). Fügt einen Anleitungs-Block als erstes Kind von #col_logs ein
#         (rechte Spalte, ÜBER dem Live-Log). Am laufenden Gerät verifiziert (Browser).
#         CSS-Weg verworfen: #col_logs liegt im Shadow-DOM, css_include durchdringt nicht.
# v0.34 |  2026-06-01        |  **Bedien-Anleitung im Web-Interface (Gruppe grp_hilfe, ganz unten).**
#         6 text_sensor-Blöcke (hlp_1..6), Texte im on_boot gesetzt, je < 255 Zeichen
#         (ESPHome/HA-State-Limit). `disabled_by_default: true` → sichtbar im web_server,
#         in HA standardmäßig deaktiviert (vermeidet die nutzlosen Entities aus v0.26).
#         Inhalt: Grundprinzip · Tor öffnen · Schließen/Schritt · Fußgänger · Wichtig · Störung.
#         Hinweis: web_server-Sichtbarkeit von disabled_by_default beim Erst-Flash verifizieren.
# v0.33 |  2026-06-01        |  **Audit-Korrekturen + Bereinigung.**
#         A1: Kommentar `on_boot priority -10` → `-100` (war falsch, Code war schon korrekt).
#         A2: Kommentar in autoclose_ped — check_close_reaktion fehlt bewusst, da AUX16-
#             Verhalten bei Ped-Stellung unbekannt (HT13 offen); Fallback = Störungs-Interval.
#         A3: hold_close — Reihenfolge getauscht: pulse_close zuerst, dann check_close_reaktion
#             (vorher umgekehrt; beide laufen parallel, aber Lesereihenfolge war irreführend).
#         A4: device_class: opening aus di2_tor_zu entfernt (ON=Tor ZU wurde als „Open"
#             angezeigt).
#         B1: Kommentar an stoer_max_close_versuche — Asymmetrie dokumentiert: Störungs-
#             Interval sendet max Befehle total; check_close_reaktion sendet max+1 total.
#         B2: Kommentar in autoclose_open — erklärt warum kein DI1-Guard nötig (Script
#             läuft nur solange DI1=1; hold_close braucht Guard, weil es ohne DI1-Trigger läuft).
#         B3: Alle 19 i_*-Info-Text-Sensoren entfernt (internal:true seit v0.26, nie sichtbar).
#             on_boot-Publishes + Sensor-Definitionen komplett gelöscht.
# v0.32 |  2026-05-31        |  **Fix: Log-/State-Spam der 3 Countdown-Sensoren (jede Sekunde „nan s").**
#         `filter_out: nan` an autoclose_open_restzeit + autoclose_ped_restzeit +
#         stoer_esk1_restzeit → NAN wird nicht mehr publiziert (web_server-Stream + Log ruhig).
#         Nebeneffekt: bei Inaktivität bleibt der letzte Zahlenwert stehen statt „unbekannt"
#         (nach Boot „unbekannt", bis das Script erstmals läuft). Akzeptiert.
# v0.31 |  2026-05-31        |  **Fix: Störungs-Interval löschte Esk1/Esk2 während check_close_reaktion aktiv war.**
#         Symptom: Esk1/Esk2 flackerten ON/OFF im Sekunden-Takt (Interval sah DI1=1 →
#         endschalter=true → löschte Esk, Script setzte beim nächsten Retry wieder).
#         Fix: Esk-Quittierung im endschalter-Branch nur wenn g_close_reaktion_versuche==0.
#         Quittierung passiert sauber wenn DI1 abfällt (counter reset) + DI2=1.
# v0.30 |  2026-05-31        |  **Close-Reaktions-Check als eigenes Script (sauberere Lösung).**
#         v0.29 g_warte_auf_close-Ansatz vollständig entfernt (Flag hat Störungs-Interval
#         verkompliziert). Ersatz: Script `check_close_reaktion` (mode: restart):
#         - Gestartet von autoclose_open + hold_close wenn DI1=1 nach pulse_close.
#         - Wartet stoer_esk1_sek. DI1 noch 1? → Esk1 + pulse_close + selbst neu starten.
#         - Nach stoer_max_close_versuche: Esk2. Kein Eingriff in Störungs-Interval.
#         - Quittierung: script.stop + Counter-Reset bei DI1 on_release / DI2 on_press /
#           dauerauf/ped_halten turn_on.
#         - Neues Global: g_close_reaktion_versuche (int).
# v0.29 |  2026-05-31        |  **Close-Reaktions-Check + Namensbereinigung.**
#         Ansatz g_warte_auf_close in v0.30 ersetzt. Namensbereinigung bleibt.
# v0.28 |  2026-05-31        |  **Web-Interface: grp_stoer (Prio 5, ganz oben) + LED-Blink in grp_test.**
#         - Neue Gruppe grp_stoer (sorting_weight 5) bündelt alle 5 Störungs-Elemente:
#           stoer_esk1_sek, stoer_max_close_versuche, stoerung_esk1, stoerung_esk2, stoer_esk1_restzeit.
#         - "Test: LED rot 5× blinken" von grp_diag nach grp_test (sorting_weight 4).
# v0.27 |  2026-05-31        |  **Fix: binary_sensor.template unterstützt kein update_interval.**
#         lambda + update_interval aus di1_tor_offen/di2_tor_zu entfernt. Stattdessen
#         interval 200ms mit publish_state(di1_raw.state || test_di1.state) — on_press/
#         on_release feuern weiterhin korrekt bei Zustandswechsel.
# v0.26 |  2026-05-31        |  **Test-Simulation DI1/DI2/DI3 + Info-Texte aus HA entfernt.**
#         - grp_test (sorting_weight 85): 2 Schalter (DI1 offen / DI2 zu) + Button DI3.
#         - DI1/DI2: GPIO-Sensor intern (di1_raw/di2_raw) + Template-Sensor
#           lambda: raw.state || test.state (update_interval 200 ms).
#           Störungs-Eskalation pausiert sobald Testschalter auf offen/zu steht.
#         - 19 ℹ️-Info-Text-Sensoren: internal: true (nicht mehr in HA).
# v0.25 |  2026-05-31        |  **Fix: Hold-Schalter stoppen jetzt gegenseitig alle Auto-Close-Timer.**
#         Bug v0.24: `dauerauf.turn_on` stoppte `autoclose_ped` nicht; `ped_halten.turn_on`
#         stoppte `autoclose_open` nicht → laufender Timer konnte nach Hold-Aktivierung noch
#         `pulse_close` senden. BFT blockiert zwar Close bei angezogenem Open-Relais, aber
#         der Fix ist korrekt (sauberer Zustand, Countdown-Sensor zeigt nicht mehr fälschlich
#         Restzeit während aktivem Hold).
#         Race Ch2/Ch3 + hold_close bewusst NICHT gefixt: doppelter Close-Befehl ist harmlos
#         (BFT ignoriert Close wenn bereits am Schließen). Kommentar im Code ergänzt.
# v0.24 |  2026-05-31        |  **Countdown-Restzeit-Sensoren für alle Timer > 1 s.**
#         3 neue Template-Sensoren in Web-UI + HA: `autoclose_open_restzeit` (Ch1) +
#         `autoclose_ped_restzeit` (Ch4) + `stoer_esk1_restzeit` (Stör-Eskalation).
#         - 2 neue Globals `g_autoclose_open_ende_millis` + `g_autoclose_ped_ende_millis`
#           werden beim Script-Start auf `millis() + delay*1000` gesetzt, beim Stop auf 0.
#         - Sensoren rechnen `(ende - now)/1000` mit NAN-Guard wenn Script inaktiv.
#         - `stoer_esk1_restzeit` rechnet `schwelle - (now - g_letzter_endstatus_millis)/1000`
#           und gibt NAN bei Endschalter/Halten, 0 bei aktivem Esk2.
#         - Entscheidung: 1-s-Impulse (pulse_open/close/step/ped) und `hold_close` (fest 1 s)
#           bekommen keinen Countdown — zu kurz, kein Mehrwert.
#         - Web-Server Live-Log bleibt drin (Latenz nur wenn Browser-Seite offen — irrelevant).
#         - CSS-Schliff Dropdowns/Zahlen-Box: bewusst nicht angepasst (Florian-Entscheidung).
# v0.23 |  2026-05-31        |  **Tor-Störungs-Erkennung (HT11+HT12).**
#         - 2 neue numbers: `stoer_esk1_sek` (Schwelle in Sek, default 180 = 3 Min) +
#           `stoer_max_close_versuche` (default 3) — beide änderbar via Web-UI/HA, persistiert.
#         - 2 neue binary_sensors (device_class: problem): `stoerung_esk1` + `stoerung_esk2` —
#           für HA-Notifications (Push/Alexa/Sonos).
#         - Logik (interval 1 s): Tor verlässt Endschalter (DI1+DI2 beide 0) → Timer läuft.
#           Pausiert bei `dauerauf=ON` oder `ped_halten=ON` (erwartete Zwischenposition).
#           Schwelle überschritten + `g_close_versuche < max` → `pulse_close` + counter++ +
#           `esk1=true` + Timer reset. Counter == max → `esk2=true`, keine weiteren Versuche.
#           Quittierung automatisch sobald DI1=1 oder DI2=1: alles aus, counter=0, Timer reset.
#         - LED-Fehler-Endlos-Blinken (`blink_fehler_start`) und `g_fehler_aktiv` GELÖSCHT:
#           Relais-Verschleiß + nachts Nachbarn + ohne Reaktionsmöglichkeit nutzlos. HA macht
#           die Eskalation (kann reagieren, kann quittieren). `blink_rot_5x` bleibt drin
#           (DI3-Verweigerung, 5× kurz = harmlos).
#         - 2 Test-Buttons "Fehler-Blinken EIN/AUS" entfernt; "Test: LED rot 5×" bleibt.
# v0.22 |  2026-05-30        |  use_address-Übergang entfernt — ESP läuft jetzt auf 192.168.200.40.
# v0.21 |  2026-05-30        |  DI3-Taster-Logik (extern, mit Sperre).
#         - DI3 on_press: wenn DI1=1 (Tor offen) → dauerauf toggeln
#                          wenn DI1=0 → blink_rot_5x (Verweigerung), KEIN Tor öffnen
#         - Begründung Sicherheit: Taster ist von außen zugänglich, darf das Tor
#           NIE selbst öffnen können — nur bestehenden Offen-Zustand „dauerhaft" machen.
#         - Web-Switch `dauerauf` bleibt OHNE Sperre (kommt später hinter Passwort).
# v0.20 |  2026-05-29        |  Feste IP + Stabilitäts-Settings für Ethernet.
#         - manual_ip: 192.168.200.40 (Gateway/DNS = FritzBox 192.168.178.1)
#         - subnet: 255.255.0.0 (/16, FB 5590 nutzt das ganze 192.168.x.x als ein Netz)
#         - Stabilität läuft über api.reboot_timeout: 0s (ethernet hat kein reboot_timeout).
# v0.19 |  2026-05-29        |  LEDs extern schaltbar machen (HA + Web-UI).
#         - r5_led_blau + r6_led_rot: `internal: true` entfernt → als Schalter sichtbar
#         - In grp_led platziert (sorting_weight 1 + 4)
#         - Hinweis: Manuelles Toggle wird bei nächstem Status-Trigger (DI1/Dauerauf-Wechsel)
#           automatisch überschrieben — das ist gewollt (Status hat Vorrang)
# v0.18 |  2026-05-29        |  **LED-Blink-Logik: 5×-Verweigerung + Fehler-Endlos-Blinken.**
#         - Globale Variable g_fehler_aktiv (bool) als Steuerflag
#         - Script blink_rot_5x: 5× rot 300 ms an / 300 ms aus, dann LED-Status-Refresh
#         - Script blink_fehler_start: while g_fehler_aktiv → beide LEDs 500 ms an/aus
#           (endet automatisch wenn Variable false → led_status_refresh)
#         - Script led_status_refresh: stellt blau/rot anhand DI1/dauerauf/ped_halten her
#         - 3 Test-Buttons in Diagnose-Gruppe (Phase-2-Trigger folgen)
# v0.17 |  2026-05-29        |  **LED-Status-Logik (blau + rot, ohne Blink/Fehler).**
#         - r5 (LED blau) auf PCA9554 Pin 4 — physisches Relais F7
#         - r6 (LED rot)  auf PCA9554 Pin 5 — physisches Relais F8
#         - LED blau ON wenn DI1=1 (Tor offen), sonst OFF
#         - LED rot ON wenn dauerauf ODER ped_halten aktiv, sonst OFF
#         - Trigger via on_state (DI1) bzw. on_turn_on/_off (Halte-Schalter)
#         - Boot: beide LEDs initial AUS (werden danach durch erste Statusupdates korrekt)
#         - Neue sorting_group grp_led für die LED-Steuerung
# v0.16 |  2026-05-29        |  **Option B: Auto-Schließ-Trigger von Button auf DI1 umstellen.**
#         - 8× binary_sensor an GPIO4..GPIO11 (INPUT_PULLUP, inverted) als DI1-DI8
#         - DI1 = Status Tor offen (BFT 24 via F3 Koppelrelais)
#         - DI2 = Status Tor zu (BFT 26 via F4 Koppelrelais)
#         - DI3 = Taster Dauerauf (externer Taster, Logik in Phase 2)
#         - DI4-DI8 = Reserve, nur als Sensor verfügbar
#         - DI1 on_press → autoclose_open starten (wenn Dauerauf+Ped AUS und t>0)
#         - DI1 on_release → autoclose_open stoppen (Sicherheit)
#         - Ch1-Öffnen-Button: autoclose_open-Aufruf ENTFERNT — DI1 macht das nun
#         - Damit funktioniert Auto-Close auch bei Öffnung via Funkfernbedienung (ohne ESP-Befehl)
# v0.15 |  2026-05-28        |  Fix Block-Revert: bei gesperrtem Halten sprang der Schalter im
#         Web-UI nicht zurück (publish(false) war No-op bei schon-false Zustand → kein Update).
#         Jetzt im Block-Fall true→false publishen → erzwingt State-Update → Schalter springt zurück.
# v0.14 |  2026-05-28        |  **1-s-Puffer + Block-Logik + Info-Text je Bedienelement.**
#         - Dauerauf/Fußgänger-Dauerauf AUS → Halte-Relais aus, dann nach 1 s Close
#           (gemeinsames restart-Script `hold_close`; Wieder-EIN eines Haltens stoppt es).
#         - Halte-Verriegelung = BLOCKIEREN statt Umschalten: ist ein Dauerauf aktiv, lässt
#           sich der andere nicht einschalten (Versuch → abgelehnt + Log, Schalter springt zurück).
#           Holds sind jetzt optimistic:false + explizites publish; g_switching entfernt.
#         - Je Bedienelement ein eigener „ℹ️"-Info-text_sensor direkt darunter (sorting_weight
#           = Control gerade / Info ungerade). Texte beim Boot gesetzt. Diagnose = 1 Sammeltext.
# v0.13 |  2026-05-28        |  Fix: eindeutige Namen für Info-text_sensors.
# v0.12 |  2026-05-28        |  Erklärungs-/Hilfetexte je Gruppe.
# v0.11 |  2026-05-28        |  Diagnose: Chip-Temp, ESPHome-Version, Verbindungsstatus.
# v0.10 |  2026-05-28        |  Fix Log-Spam: Status event-getrieben.
# v0.7-0.9 |  2026-05-28     |  Buttons (1 s Impuls), Dauerauf/Ped-halten, Auto-Schließen, Sperren, LCARS v3, Status-Punkte.
# v0.1-0.6 |  2026-05-28     |  Grundgerüst Ethernet/API/OTA, 4 Kanäle, web_server v3, Icons, LCARS.
# ─────────────────────────────────────────────────────────────────
#
#  Hoftor-Steuerung — Waveshare ESP32-S3-POE-ETH-8DI-8RO
#  BFT Thalia BT A80/A160 + EBD.  Doku: hw-hoftor/CLAUDE.md
#  Relais: r1=Open(BFT65) r2=Close(BFT62) r3=Schritt(BFT64) r4=Ped(BFT61, IC=6 Timer Ped)
#  TCA aus → ESP schließt aktiv.  ⚠️ Erst-Flash USB-C, danach OTA.  Ethernet XOR WiFi.

esphome:
  name: hoftor
  friendly_name: "Hoftor"
  on_boot:
    priority: -100
    then:
      # v0.23: Stör-Timer init (sonst Sofort-Alarm 180 s nach Boot)
      - lambda: 'id(g_letzter_endstatus_millis) = millis();'
      # v0.23: Esk-Sensoren initial OFF publishen (sonst „unknown" in HA)
      - binary_sensor.template.publish: { id: stoerung_esk1, state: OFF }
      - binary_sensor.template.publish: { id: stoerung_esk2, state: OFF }
      # Status-Punkte initialisieren
      - text_sensor.template.publish: { id: st_r1, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r2, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r3, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r4, state: "🔴 aus" }
      - text_sensor.template.publish: { id: st_r5, state: "⚫ aus" }
      - text_sensor.template.publish: { id: st_r6, state: "⚫ aus" }
      # Halte-Schalter (optimistic:false) auf AUS setzen
      - switch.template.publish: { id: dauerauf, state: false }
      - switch.template.publish: { id: ped_halten, state: false }

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

ethernet:
  type: W5500
  clk_pin: GPIO15
  mosi_pin: GPIO13
  miso_pin: GPIO14
  cs_pin: GPIO16
  interrupt_pin: GPIO12
  # Hinweis: ethernet hat KEIN reboot_timeout (nur api/wifi). Stabilität läuft über api.reboot_timeout: 0s.
  manual_ip:
    static_ip: 192.168.200.40
    gateway:   192.168.178.1     # FritzBox 5590
    subnet:    255.255.0.0       # /16 — alle 192.168.x.x im selben Netz
    dns1:      192.168.178.1     # FritzBox als DNS

web_server:
  port: 80
  version: 3
  log: true
  css_include: hoftor_lcars.css
  js_include: hoftor_help.js     # v0.35: Bedien-Anleitung über dem Log (DOM-Injektion, /0.js)
  sorting_groups:
    - id: grp_stoer
      name: "Störungs-Erkennung"
      sorting_weight: 5
    - id: grp_ch1
      name: "Ch1 — Tor auf"
      sorting_weight: 10
    - id: grp_ch2
      name: "Ch2 — Tor zu"
      sorting_weight: 20
    - id: grp_ch3
      name: "Ch3 — auf-stopp-zu"
      sorting_weight: 30
    - id: grp_ch4
      name: "Ch4 — Fußgänger (Ped)"
      sorting_weight: 40
    - id: grp_led
      name: "LEDs (F7 blau / F8 rot)"
      sorting_weight: 70
    - id: grp_input
      name: "Eingänge (DI1-DI8)"
      sorting_weight: 80
    - id: grp_test
      name: "Test (Simulation)"
      sorting_weight: 85
    - id: grp_diag
      name: "Diagnose"
      sorting_weight: 90

i2c:
  sda: GPIO42
  scl: GPIO41
  frequency: 100kHz
  scan: true

pca9554:
  - id: relay_hub
    address: 0x20

# ── Interne Relais (PCA9554 Pin 0-3) — publishen Status bei Schaltvorgang ─
switch:
  - platform: gpio
    name: "relay_open"
    id: r1
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 0, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r1, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r1, state: "🔴 aus" }
  - platform: gpio
    name: "relay_close"
    id: r2
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 1, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r2, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r2, state: "🔴 aus" }
  - platform: gpio
    name: "relay_step"
    id: r3
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 2, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r3, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r3, state: "🔴 aus" }
  - platform: gpio
    name: "relay_ped"
    id: r4
    internal: true
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 3, mode: { output: true } }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r4, state: "🟢 angezogen" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r4, state: "🔴 aus" }

  # ── LED-Relais r5 (blau, F7) + r6 (rot, F8) ─────────────────────
  # Werden automatisch über Status-Logik gesteuert:
  #   blau: ON wenn DI1=1 (Tor offen)
  #   rot:  ON wenn dauerauf ODER ped_halten aktiv
  # PLUS extern schaltbar in HA + Web-UI (für Diagnose/Override).
  # Manuelles Toggle wird beim nächsten Status-Trigger automatisch überschrieben.
  - platform: gpio
    name: "LED blau"
    id: r5_led_blau
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 4, mode: { output: true } }
    icon: "mdi:lightbulb"
    web_server: { sorting_group_id: grp_led, sorting_weight: 1 }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r5, state: "🔵 leuchtet" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r5, state: "⚫ aus" }

  - platform: gpio
    name: "LED rot"
    id: r6_led_rot
    restore_mode: ALWAYS_OFF
    pin: { pca9554: relay_hub, number: 5, mode: { output: true } }
    icon: "mdi:lightbulb"
    web_server: { sorting_group_id: grp_led, sorting_weight: 4 }
    on_turn_on:
      - text_sensor.template.publish: { id: st_r6, state: "🔴 leuchtet" }
    on_turn_off:
      - text_sensor.template.publish: { id: st_r6, state: "⚫ aus" }

  # ── Dauerauf (hält r1) — blockiert wenn Fußgänger Dauerauf aktiv ─
  - platform: template
    name: "Ch1 — Dauerauf"
    id: dauerauf
    icon: "mdi:gate-open"
    optimistic: false
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 4
    turn_on_action:
      - if:
          condition:
            switch.is_on: ped_halten
          then:
            - logger.log:
                level: INFO
                format: "Dauerauf gesperrt — erst Fußgänger Dauerauf ausschalten"
            # true→false erzwingt ein State-Update, sonst springt der Web-Schalter nicht zurück
            - switch.template.publish: { id: dauerauf, state: true }
            - switch.template.publish: { id: dauerauf, state: false }
          else:
            - script.stop: hold_close
            - script.stop: autoclose_open
            - lambda: 'id(g_autoclose_open_ende_millis) = 0;'
            - script.stop: autoclose_ped        # v0.25 Fix: laufender Ped-Timer würde sonst Close trotz Dauerauf senden
            - lambda: 'id(g_autoclose_ped_ende_millis) = 0;'
            - script.stop: check_close_reaktion          # v0.30: Dauerauf → kein Close erwartet
            - lambda: 'id(g_close_reaktion_versuche) = 0;'
            - logger.log:
                level: INFO
                format: "Dauerauf EIN → Tor offen halten (r1 dauerhaft)"
            - switch.turn_on: r1
            - switch.turn_on: r6_led_rot     # LED rot AN
            - switch.template.publish: { id: dauerauf, state: true }
    turn_off_action:
      - switch.turn_off: r1
      # LED rot nur AUS wenn auch ped_halten AUS
      - if:
          condition:
            switch.is_off: ped_halten
          then:
            - switch.turn_off: r6_led_rot
      - switch.template.publish: { id: dauerauf, state: false }
      - logger.log:
          level: INFO
          format: "Dauerauf AUS → Close in 1 s"
      - script.execute: hold_close

  # ── Fußgänger Dauerauf (hält r4) — blockiert wenn Dauerauf aktiv ─
  - platform: template
    name: "Ch4 — Fußgänger Dauerauf"
    id: ped_halten
    icon: "mdi:walk"
    optimistic: false
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 4
    turn_on_action:
      - if:
          condition:
            switch.is_on: dauerauf
          then:
            - logger.log:
                level: INFO
                format: "Fußgänger Dauerauf gesperrt — erst Dauerauf ausschalten"
            # true→false erzwingt ein State-Update, sonst springt der Web-Schalter nicht zurück
            - switch.template.publish: { id: ped_halten, state: true }
            - switch.template.publish: { id: ped_halten, state: false }
          else:
            - script.stop: hold_close
            - script.stop: autoclose_ped
            - lambda: 'id(g_autoclose_ped_ende_millis) = 0;'
            - script.stop: autoclose_open       # v0.25 Fix: laufender Open-Timer würde sonst Close trotz Ped-Hold senden
            - lambda: 'id(g_autoclose_open_ende_millis) = 0;'
            - script.stop: check_close_reaktion          # v0.30: Ped-Hold → kein Close erwartet
            - lambda: 'id(g_close_reaktion_versuche) = 0;'
            - logger.log:
                level: INFO
                format: "Fußgänger Dauerauf EIN → ein Flügel offen halten (r4 dauerhaft)"
            - switch.turn_on: r4
            - switch.turn_on: r6_led_rot     # LED rot AN
            - switch.template.publish: { id: ped_halten, state: true }
    turn_off_action:
      - switch.turn_off: r4
      # LED rot nur AUS wenn auch dauerauf AUS
      - if:
          condition:
            switch.is_off: dauerauf
          then:
            - switch.turn_off: r6_led_rot
      - switch.template.publish: { id: ped_halten, state: false }
      - logger.log:
          level: INFO
          format: "Fußgänger Dauerauf AUS → Close in 1 s"
      - script.execute: hold_close

  # ── Test-Schalter (simulieren DI1 / DI2 für Bench-Test ohne Tor-Anschluss) ──
  # Wenn EIN: template-binary_sensor di1/di2 liefert true → Störungs-Timer hält an,
  # LED-Logik und Auto-Close-Trigger reagieren wie beim echten Endschalter-Signal.
  - platform: template
    name: "Test: DI1 Tor offen"
    id: test_di1
    icon: "mdi:gate-open"
    optimistic: true
    restore_mode: ALWAYS_OFF
    web_server: { sorting_group_id: grp_test, sorting_weight: 1 }

  - platform: template
    name: "Test: DI2 Tor zu"
    id: test_di2
    icon: "mdi:gate"
    optimistic: true
    restore_mode: ALWAYS_OFF
    web_server: { sorting_group_id: grp_test, sorting_weight: 2 }

# ── Auto-Schließ-Zeiten (0 = aus) ────────────────────────────────
number:
  - platform: template
    name: "Ch1 — Auto-Schließ-Zeit"
    id: t_autoclose_open
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 600
    step: 1
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    mode: box
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 6
  - platform: template
    name: "Ch4 — Auto-Schließ-Zeit"
    id: t_autoclose_ped
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 600
    step: 1
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    mode: box
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 6

  # ── Tor-Störungs-Erkennung (v0.23) ─────────────────────────────
  - platform: template
    name: "Störung — Esk1-Schwelle"
    id: stoer_esk1_sek
    optimistic: true
    restore_value: true
    initial_value: 180          # 3 Min
    min_value: 30
    max_value: 1800
    step: 10
    unit_of_measurement: "s"
    icon: "mdi:timer-alert-outline"
    mode: box
    web_server: { sorting_group_id: grp_stoer, sorting_weight: 1 }
  - platform: template
    name: "Störung — max. Schließ-Versuche bis Esk2"
    id: stoer_max_close_versuche
    # Hinweis: dieser Parameter steuert beide Systeme, bedeutet aber je etwas anderes:
    # - Störungs-Interval:      sendet genau max Close-Befehle total, dann Esk2.
    # - check_close_reaktion:   sendet max Retries ZUSÄTZLICH zum initialen Close
    #   aus autoclose_open/hold_close → total max+1 Close-Befehle über diesen Pfad.
    optimistic: true
    restore_value: true
    initial_value: 3
    min_value: 1
    max_value: 10
    step: 1
    icon: "mdi:counter"
    mode: box
    web_server: { sorting_group_id: grp_stoer, sorting_weight: 2 }

# ── Befehls-Buttons (fix 1 s Impuls) ─────────────────────────────
button:
  - platform: template
    name: "Ch1 — Öffnen"
    icon: "mdi:gate-open"
    web_server:
      sorting_group_id: grp_ch1
      sorting_weight: 2
    on_press:
      - if:
          condition:
            switch.is_off: dauerauf
          then:
            - logger.log:
                level: INFO
                format: "Ch1 (Tor auf): Öffnen-Impuls"
            - script.execute: pulse_open
            # Auto-Close-Trigger: NICHT mehr hier — wird von DI1 (Tor offen erreicht) gestartet (Option B v0.16)
          else:
            - logger.log:
                level: INFO
                format: "Ch1: Öffnen gesperrt (Dauerauf aktiv)"

  - platform: template
    name: "Ch2 — Schließen"
    icon: "mdi:gate"
    web_server:
      sorting_group_id: grp_ch2
      sorting_weight: 2
    on_press:
      - if:
          condition:
            and:
              - switch.is_off: dauerauf
              - switch.is_off: ped_halten
          then:
            - script.stop: autoclose_open
            - script.stop: autoclose_ped
            - lambda: |-
                id(g_autoclose_open_ende_millis) = 0;
                id(g_autoclose_ped_ende_millis) = 0;
            # hold_close wird bewusst NICHT gestoppt: läuft es noch (1-s-Fenster nach Hold-AUS),
            # folgt ein zweiter Close-Impuls — harmlos, da BFT Close bei laufender Schließung ignoriert.
            - logger.log:
                level: INFO
                format: "Ch2 (Tor zu): Schließen-Impuls"
            - script.execute: pulse_close
          else:
            - logger.log:
                level: INFO
                format: "Ch2: Schließen gesperrt (Halten aktiv)"

  - platform: template
    name: "Ch3 — auf-stopp-zu"
    icon: "mdi:gate-arrow-right"
    web_server:
      sorting_group_id: grp_ch3
      sorting_weight: 2
    on_press:
      - if:
          condition:
            and:
              - switch.is_off: dauerauf
              - switch.is_off: ped_halten
          then:
            - script.stop: autoclose_open
            - script.stop: autoclose_ped
            - lambda: |-
                id(g_autoclose_open_ende_millis) = 0;
                id(g_autoclose_ped_ende_millis) = 0;
            # hold_close wird bewusst NICHT gestoppt: läuft es noch (1-s-Fenster nach Hold-AUS),
            # folgt ein Close-Impuls nach dem Schritt-Befehl — harmlos, da BFT Close bei
            # laufender Schließung ignoriert.
            - logger.log:
                level: INFO
                format: "Ch3 (auf-stopp-zu): Impuls"
            - script.execute: pulse_step
          else:
            - logger.log:
                level: INFO
                format: "Ch3: auf-stopp-zu gesperrt (Halten aktiv)"

  - platform: template
    name: "Ch4 — Fußgänger"
    icon: "mdi:walk"
    web_server:
      sorting_group_id: grp_ch4
      sorting_weight: 2
    on_press:
      - if:
          condition:
            and:
              - switch.is_off: dauerauf
              - switch.is_off: ped_halten
          then:
            - logger.log:
                level: INFO
                format: "Ch4 (Ped): Fußgänger-Impuls"
            - script.execute: pulse_ped
            - if:
                condition:
                  lambda: 'return id(t_autoclose_ped).state > 0;'
                then:
                  - script.execute: autoclose_ped
          else:
            - logger.log:
                level: INFO
                format: "Ch4: Fußgänger gesperrt (Halten aktiv)"

  # ── Test-Button DI3 (simuliert Taster-Druck für Bench-Test) ────
  # Identische Logik wie di3_taster on_press: Toggle Dauerauf nur wenn di1_tor_offen=1.
  - platform: template
    name: "Test: DI3 Taster"
    icon: "mdi:gesture-tap-button"
    web_server: { sorting_group_id: grp_test, sorting_weight: 3 }
    on_press:
      - if:
          condition:
            binary_sensor.is_on: di1_tor_offen
          then:
            - logger.log:
                level: INFO
                format: "TEST DI3: Tor offen → Dauerauf togglen"
            - switch.toggle: dauerauf
          else:
            - logger.log:
                level: WARN
                format: "TEST DI3 VERWEIGERT — Tor nicht offen"
            - script.execute: blink_rot_5x

  # ── Test-Buttons für LED-Blink-Patterns (Diagnose-Gruppe) ──────
  - platform: template
    name: "Test: LED rot 5× blinken"
    icon: "mdi:lightbulb-alert"
    web_server: { sorting_group_id: grp_test, sorting_weight: 4 }
    on_press:
      - logger.log:
          level: INFO
          format: "Test: 5× rot-Blink ausgelöst"
      - script.execute: blink_rot_5x


# ── Globale Variablen (Status-Flags für Logik) ──────────────────
globals:
  # ── Tor-Störungs-Erkennung (v0.23) ──
  # g_letzter_endstatus_millis: millis()-Timestamp wann zuletzt DI1=1 oder DI2=1 war.
  # Wird beim Boot via on_boot priority -100 auf millis() gesetzt (sonst Sofort-Alarm).
  - id: g_letzter_endstatus_millis
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: g_close_versuche
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_stoerung_esk1
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_stoerung_esk2
    type: bool
    restore_value: no
    initial_value: 'false'
  # ── Close-Reaktions-Check (v0.30) ──
  # Zählt Retry-Versuche von check_close_reaktion.
  # Reset bei: DI1 on_release / DI2 on_press / dauerauf/ped_halten turn_on.
  - id: g_close_reaktion_versuche
    type: int
    restore_value: no
    initial_value: '0'
  # ── Countdown-Marker (v0.24) ──
  # 0 = Script inaktiv (Sensor → NAN/unknown).
  # > 0 = millis()-Timestamp wann das Auto-Close-Script den pulse_close auslöst.
  - id: g_autoclose_open_ende_millis
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: g_autoclose_ped_ende_millis
    type: uint32_t
    restore_value: no
    initial_value: '0'

# ── Scripts: feste 1 s Impulse + Auto-Schließen + Halten-Puffer ──
script:
  - id: pulse_open
    mode: restart
    then:
      - switch.turn_on: r1
      - delay: 1s
      - switch.turn_off: r1
  - id: pulse_close
    mode: restart
    then:
      - switch.turn_on: r2
      - delay: 1s
      - switch.turn_off: r2
  - id: pulse_step
    mode: restart
    then:
      - switch.turn_on: r3
      - delay: 1s
      - switch.turn_off: r3
  - id: pulse_ped
    mode: restart
    then:
      - switch.turn_on: r4
      - delay: 1s
      - switch.turn_off: r4

  # 1-s-Puffer nach Dauerauf/Fußgänger-Dauerauf AUS → dann Close.
  # restart: wird ein Halten innerhalb der 1 s wieder aktiviert, stoppt es den Puffer.
  # Ch2/Ch3 stoppen hold_close bewusst NICHT — falls beides innerhalb 1 s ausgelöst wird,
  # landet ein zweiter Close-Impuls; das ist harmlos (BFT ignoriert Close bei Schließbewegung).
  - id: hold_close
    mode: restart
    then:
      - delay: 1s
      - logger.log:
          level: INFO
          format: "Halten-Puffer (1 s) abgelaufen → Close"
      - script.execute: pulse_close
      - if:
          condition:
            binary_sensor.is_on: di1_tor_offen
          then:
            - script.execute: check_close_reaktion  # v0.30: Tor offen → reagiert es auf Close?

  - id: autoclose_open
    mode: restart
    then:
      - lambda: |-
          id(g_autoclose_open_ende_millis) = millis()
            + (uint32_t)(id(t_autoclose_open).state * 1000.0f);
      - delay: !lambda 'return (uint32_t)(id(t_autoclose_open).state * 1000);'
      - lambda: 'id(g_autoclose_open_ende_millis) = 0;'
      - logger.log:
          level: INFO
          format: "Ch1 (Tor auf): Auto-Schließ-Zeit abgelaufen → Close"
      - script.execute: pulse_close
      # Kein DI1-Guard nötig: autoclose_open wird nur von DI1 on_press gestartet und bei
      # DI1 on_release sofort gestoppt — am Ende des Delays ist DI1 praktisch sicher 1.
      # (hold_close prüft DI1 explizit, weil es auch ohne vorherigen DI1-Trigger läuft.)
      - script.execute: check_close_reaktion   # v0.30: Tor reagiert nicht → Esk1/Esk2
  - id: autoclose_ped
    mode: restart
    then:
      - lambda: |-
          id(g_autoclose_ped_ende_millis) = millis()
            + (uint32_t)(id(t_autoclose_ped).state * 1000.0f);
      - delay: !lambda 'return (uint32_t)(id(t_autoclose_ped).state * 1000);'
      - lambda: 'id(g_autoclose_ped_ende_millis) = 0;'
      - logger.log:
          level: INFO
          format: "Ch4 (Ped): Auto-Schließ-Zeit abgelaufen → Close"
      - script.execute: pulse_close
      # Kein check_close_reaktion hier: AUX16-Verhalten bei Ped-Stellung unbekannt (HT13).
      # Wenn AUX16 nur bei voll-offen schließt, wären DI1=0 UND DI2=0 in Ped-Stellung —
      # identisch mit Zwischenposition/Störung. check_close_reaktion würde dann sofort feuern.
      # Fallback: der Störungs-Interval erkennt fehlende Endlage nach stoer_esk1_sek s.

  # ── Close-Reaktions-Check (v0.30) ────────────────────────────
  # Gestartet wenn DI1=1 nach pulse_close (Tor hat Close-Befehl bekommen aber reagiert noch nicht).
  # Wartet stoer_esk1_sek. DI1 noch immer 1?
  #   counter < max → Esk1 setzen + erneut pulse_close + Script neu starten (mode: restart)
  #   counter >= max → Esk2 setzen, kein weiterer Versuch → HA benachrichtigt
  # Fällt DI1 auf 0 (Tor bewegt sich): script.stop von außen → normaler Störungs-Interval.
  - id: check_close_reaktion
    mode: restart
    then:
      - delay: !lambda 'return (uint32_t)(id(stoer_esk1_sek).state * 1000);'
      - if:
          condition:
            binary_sensor.is_on: di1_tor_offen
          then:
            - if:
                condition:
                  lambda: 'return id(g_close_reaktion_versuche) < (int)id(stoer_max_close_versuche).state;'
                then:
                  - lambda: |-
                      id(g_close_reaktion_versuche) += 1;
                      if (!id(g_stoerung_esk1)) {
                        id(g_stoerung_esk1) = true;
                        id(stoerung_esk1).publish_state(true);
                      }
                  - logger.log:
                      level: WARN
                      format: "Close-Reaktion #%d/%d: DI1 noch offen → pulse_close + Retry"
                      args: ['id(g_close_reaktion_versuche)', '(int)id(stoer_max_close_versuche).state']
                  - script.execute: pulse_close
                  - script.execute: check_close_reaktion   # mode:restart → Delay neu starten
                else:
                  - lambda: |-
                      if (!id(g_stoerung_esk2)) {
                        id(g_stoerung_esk2) = true;
                        id(stoerung_esk2).publish_state(true);
                      }
                  - logger.log:
                      level: ERROR
                      format: "Close-Reaktion: max Versuche (%d) erschoepft → Esk2, keine weiteren Versuche"
                      args: ['(int)id(stoer_max_close_versuche).state']

  # ── LED-Helper-Scripts (v0.18) ────────────────────────────────
  # Stellt blau/rot anhand DI1 / dauerauf / ped_halten her.
  # Wird nach Blink-Pattern aufgerufen, damit LEDs den korrekten Normalzustand zeigen.
  - id: led_status_refresh
    mode: single
    then:
      # LED blau: an wenn DI1=1, sonst aus
      - if:
          condition:
            binary_sensor.is_on: di1_tor_offen
          then:
            - switch.turn_on: r5_led_blau
          else:
            - switch.turn_off: r5_led_blau
      # LED rot: an wenn dauerauf ODER ped_halten, sonst aus
      - if:
          condition:
            or:
              - switch.is_on: dauerauf
              - switch.is_on: ped_halten
          then:
            - switch.turn_on: r6_led_rot
          else:
            - switch.turn_off: r6_led_rot

  # 5× LED rot blinken (300 ms an / 300 ms aus) → dann Normalstatus wiederherstellen
  # Verwendung: bei Befehls-Verweigerung (Phase 2: Taster oder Schalter-Sperre)
  - id: blink_rot_5x
    mode: restart      # bei erneutem Aufruf von vorne starten
    then:
      - repeat:
          count: 5
          then:
            - switch.turn_on: r6_led_rot
            - delay: 300ms
            - switch.turn_off: r6_led_rot
            - delay: 300ms
      - script.execute: led_status_refresh
      - logger.log:
          level: INFO
          format: "LED rot 5× blinken beendet → Status refresh"

# ── Tor-Störungs-Erkennung (v0.23) ───────────────────────────────
# State-Machine alle 1 s:
#   - Endschalter aktiv (DI1=1 oder DI2=1) → reset alles, Timer neu.
#   - Halten aktiv (dauerauf oder ped_halten) → erwartete Zwischenposition,
#     Timer einfrieren (mitnachschieben), counter + esk1/2 zurücksetzen.
#   - Sonst: Tor in Zwischenposition. Wenn elapsed >= Schwelle:
#       * counter < max → pulse_close + counter++ + esk1=true + Timer reset
#       * counter == max → esk2=true (kein weiterer Puls).
interval:
  # ── DI1/DI2 Template-Sensor-Sync (v0.27) ─────────────────────────
  # binary_sensor.template unterstützt kein update_interval → publish_state im Interval.
  # on_press/on_release feuern automatisch bei Zustandswechsel.
  - interval: 200ms
    then:
      - lambda: |-
          id(di1_tor_offen).publish_state(id(di1_raw).state || id(test_di1).state);
          id(di2_tor_zu).publish_state(id(di2_raw).state || id(test_di2).state);

  - interval: 1s
    then:
      - lambda: |-
          uint32_t now = millis();
          bool endschalter = id(di1_tor_offen).state || id(di2_tor_zu).state;
          bool halten = id(dauerauf).state || id(ped_halten).state;
          if (endschalter) {
            id(g_letzter_endstatus_millis) = now;
            id(g_close_versuche) = 0;
            // v0.30 Fix: Esk nur quittieren wenn check_close_reaktion NICHT aktiv.
            // Sonst würde Esk1/Esk2 im Sekunden-Takt flackern (ON durch Script, OFF durch Interval).
            // Quittierung passiert sobald counter=0 (reset bei DI1 on_release / DI2 on_press).
            if (id(g_close_reaktion_versuche) == 0) {
              if (id(g_stoerung_esk1)) {
                id(g_stoerung_esk1) = false;
                id(stoerung_esk1).publish_state(false);
              }
              if (id(g_stoerung_esk2)) {
                id(g_stoerung_esk2) = false;
                id(stoerung_esk2).publish_state(false);
              }
            }
          } else if (halten) {
            id(g_letzter_endstatus_millis) = now;
            id(g_close_versuche) = 0;
            if (id(g_stoerung_esk1)) {
              id(g_stoerung_esk1) = false;
              id(stoerung_esk1).publish_state(false);
            }
            if (id(g_stoerung_esk2)) {
              id(g_stoerung_esk2) = false;
              id(stoerung_esk2).publish_state(false);
            }
          }
      - if:
          condition:
            lambda: |-
              if (id(di1_tor_offen).state || id(di2_tor_zu).state) return false;
              if (id(dauerauf).state || id(ped_halten).state) return false;
              uint32_t elapsed = (millis() - id(g_letzter_endstatus_millis)) / 1000;
              return elapsed >= (uint32_t) id(stoer_esk1_sek).state;
          then:
            - if:
                condition:
                  lambda: 'return id(g_close_versuche) < (int) id(stoer_max_close_versuche).state;'
                then:
                  - lambda: |-
                      id(g_close_versuche) += 1;
                      id(g_letzter_endstatus_millis) = millis();
                      if (!id(g_stoerung_esk1)) {
                        id(g_stoerung_esk1) = true;
                        id(stoerung_esk1).publish_state(true);
                      }
                  - logger.log:
                      level: WARN
                      format: "Stör-Esk1 #%d/%d: Tor > Schwelle in Zwischenposition → pulse_close"
                      args: ['id(g_close_versuche)', '(int) id(stoer_max_close_versuche).state']
                  - script.execute: pulse_close
                else:
                  - if:
                      condition:
                        lambda: 'return !id(g_stoerung_esk2);'
                      then:
                        - lambda: |-
                            id(g_stoerung_esk2) = true;
                            id(stoerung_esk2).publish_state(true);
                        - logger.log:
                            level: ERROR
                            format: "Stör-Esk2: max Close-Versuche (%d) erschöpft — HA muss reagieren"
                            args: ['(int) id(stoer_max_close_versuche).state']

# ── Eingänge (DI1-DI8 an GPIO4-GPIO11, INPUT_PULLUP, inverted) ──
# DI1 = Status Tor offen   (BFT 24 via Phoenix RIF-0 F3) → Auto-Close-Trigger
# DI2 = Status Tor zu      (BFT 26 via Phoenix RIF-0 F4)
# DI3 = Taster Dauerauf    (externer Taster) — Logik in Phase 2
# DI4 = Funk Hörmann K1    (HET/S 24 Kanal 1, 0,5-s-Impuls → +24V auf DI) — Schalt-Logik in HA
# DI5 = Funk Hörmann K2    (HET/S 24 Kanal 2) — Schalt-Logik in HA
# DI6-DI8 = Reserve
binary_sensor:
  # ── DI1/DI2: physische GPIO-Sensoren (intern) + Template-Overlay ─────────────
  # v0.26/v0.27: GPIO-Sensoren intern (di1_raw/di2_raw). Template-Sensoren
  # di1_tor_offen/di2_tor_zu ohne lambda — Zustand kommt per interval 200ms
  # via publish_state(raw.state || test.state). on_press/on_release feuern bei Wechsel.
  - platform: gpio
    name: "DI1 raw"
    id: di1_raw
    internal: true
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 100ms

  - platform: template
    name: "DI1 — Tor offen"
    id: di1_tor_offen
    device_class: opening
    web_server: { sorting_group_id: grp_input, sorting_weight: 1 }
    on_press:
      # Trigger: DI1 wechselt 0→1 (physisch oder Test-Schalter)
      # Option B: Auto-Close-Timer + LED blau
      then:
        - logger.log:
            level: INFO
            format: "DI1: Tor erreicht Endlage offen"
        - switch.turn_on: r5_led_blau
        - if:
            condition:
              and:
                - switch.is_off: dauerauf
                - switch.is_off: ped_halten
            then:
              - if:
                  condition:
                    lambda: 'return id(t_autoclose_open).state > 0;'
                  then:
                    - logger.log:
                        level: INFO
                        format: "DI1 → autoclose_open gestartet"
                    - script.execute: autoclose_open
            else:
              - logger.log:
                  level: INFO
                  format: "DI1 → autoclose_open NICHT gestartet (Halten aktiv)"
    on_release:
      # Trigger: DI1 wechselt 1→0 (physisch UND Test-Schalter beide 0)
      then:
        - logger.log:
            level: INFO
            format: "DI1: Tor verlässt Endlage offen → autoclose_open gestoppt"
        - switch.turn_off: r5_led_blau
        - script.stop: autoclose_open
        - lambda: 'id(g_autoclose_open_ende_millis) = 0;'
        - script.stop: check_close_reaktion          # v0.30: Tor bewegt sich → Check beendet
        - lambda: 'id(g_close_reaktion_versuche) = 0;'

  - platform: gpio
    name: "DI2 raw"
    id: di2_raw
    internal: true
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 100ms

  - platform: template
    name: "DI2 — Tor zu"
    id: di2_tor_zu
    # kein device_class: opening — DI2=1 bedeutet Tor ZU, HA würde das als "Open" anzeigen (falsch)
    web_server: { sorting_group_id: grp_input, sorting_weight: 2 }
    on_press:
      then:
        - logger.log:
            level: INFO
            format: "DI2: Tor erreicht Endlage zu"
        - script.stop: check_close_reaktion          # v0.30: Tor geschlossen → Check beendet
        - lambda: 'id(g_close_reaktion_versuche) = 0;'

  - platform: gpio
    name: "DI3 — Taster Dauerauf"
    id: di3_taster
    pin:
      number: GPIO6
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    web_server: { sorting_group_id: grp_input, sorting_weight: 3 }
    # v0.21: Toggle Dauerauf NUR wenn Tor bereits offen (DI1=1).
    # Sicherheit: Taster ist von außen zugänglich → darf das Tor NICHT öffnen.
    # Bei Verweigerung: 5× rot blinken, keine Aktion am Tor.
    on_press:
      then:
        - if:
            condition:
              binary_sensor.is_on: di1_tor_offen
            then:
              - logger.log:
                  level: INFO
                  format: "DI3 (Taster): Tor offen → Dauerauf togglen"
              - switch.toggle: dauerauf
            else:
              - logger.log:
                  level: WARN
                  format: "DI3 (Taster) VERWEIGERT — Tor nicht offen (Sicherheit: kein Öffnen via Taster)"
              - script.execute: blink_rot_5x

  # DI4/DI5 = Funk-Empfänger Hörmann HET/S 24 (Kanal 1/2). Reine Melder — Schalt-Logik in HA.
  # Empfänger im FIBOX, 24 V; potenzialfreier Kontakt: COM=+24V (R-Block), NO=DI-Klemme.
  - platform: gpio
    name: "Funk Hörmann K1"
    id: di4
    pin: { number: GPIO7, mode: INPUT_PULLUP, inverted: true }
    filters:
      - delayed_on: 20ms
      - delayed_off: 50ms
    web_server: { sorting_group_id: grp_input, sorting_weight: 4 }

  - platform: gpio
    name: "Funk Hörmann K2"
    id: di5
    pin: { number: GPIO8, mode: INPUT_PULLUP, inverted: true }
    filters:
      - delayed_on: 20ms
      - delayed_off: 50ms
    web_server: { sorting_group_id: grp_input, sorting_weight: 5 }

  - platform: gpio
    name: "DI6"
    id: di6
    pin: { number: GPIO9, mode: INPUT_PULLUP, inverted: true }
    web_server: { sorting_group_id: grp_input, sorting_weight: 6 }

  - platform: gpio
    name: "DI7"
    id: di7
    pin: { number: GPIO10, mode: INPUT_PULLUP, inverted: true }
    web_server: { sorting_group_id: grp_input, sorting_weight: 7 }

  - platform: gpio
    name: "DI8"
    id: di8
    pin: { number: GPIO11, mode: INPUT_PULLUP, inverted: true }
    web_server: { sorting_group_id: grp_input, sorting_weight: 8 }

  # ── Tor-Störungs-Erkennung (v0.23) ────────────────────────────
  - platform: template
    name: "Störung Eskalation 1"
    id: stoerung_esk1
    device_class: problem
    web_server: { sorting_group_id: grp_stoer, sorting_weight: 3 }
  - platform: template
    name: "Störung Eskalation 2"
    id: stoerung_esk2
    device_class: problem
    web_server: { sorting_group_id: grp_stoer, sorting_weight: 4 }

# ── Diagnose ─────────────────────────────────────────────────────
  - platform: status
    name: "Verbindung (API)"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 1

sensor:
  - platform: uptime
    name: "Uptime"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 2
  - platform: internal_temperature
    name: "Chip-Temperatur"
    update_interval: 60s
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 3

  # ── Countdown-Restzeit-Sensoren (v0.24) ─────────────────────────
  # Lesen die *_ende_millis-Globals. NAN = Script inaktiv.
  # v0.32: filter_out: nan → NAN wird NICHT publiziert (sonst State-Spam jede Sekunde,
  #   sichtbar im web_server-Stream als „[S][sensor] >> nan"). ESPHome filtert NAN via
  #   std::isnan intern. Nebeneffekt: bei Inaktivität bleibt der letzte Zahlenwert stehen
  #   (nach Boot „unbekannt", bis das jeweilige Script erstmals läuft).
  - platform: template
    name: "Ch1 — Auto-Schließ-Restzeit"
    id: autoclose_open_restzeit
    unit_of_measurement: "s"
    accuracy_decimals: 0
    icon: "mdi:timer-sand"
    update_interval: 1s
    lambda: |-
      uint32_t ende = id(g_autoclose_open_ende_millis);
      if (ende == 0) return NAN;
      uint32_t now = millis();
      if (now >= ende) return 0.0f;
      return (float)(ende - now) / 1000.0f;
    filters:
      - filter_out: nan
    web_server: { sorting_group_id: grp_ch1, sorting_weight: 8 }
  - platform: template
    name: "Ch4 — Auto-Schließ-Restzeit"
    id: autoclose_ped_restzeit
    unit_of_measurement: "s"
    accuracy_decimals: 0
    icon: "mdi:timer-sand"
    update_interval: 1s
    lambda: |-
      uint32_t ende = id(g_autoclose_ped_ende_millis);
      if (ende == 0) return NAN;
      uint32_t now = millis();
      if (now >= ende) return 0.0f;
      return (float)(ende - now) / 1000.0f;
    filters:
      - filter_out: nan
    web_server: { sorting_group_id: grp_ch4, sorting_weight: 8 }
  - platform: template
    name: "Störung — Restzeit bis Esk1"
    id: stoer_esk1_restzeit
    unit_of_measurement: "s"
    accuracy_decimals: 0
    icon: "mdi:timer-sand-complete"
    update_interval: 1s
    lambda: |-
      // NAN solange Endschalter oder Halten aktiv (= keine Stör-Erkennung)
      if (id(di1_tor_offen).state || id(di2_tor_zu).state) return NAN;
      if (id(dauerauf).state || id(ped_halten).state) return NAN;
      // Esk2 aktiv → 0 (keine weiteren Auslösungen mehr)
      if (id(g_stoerung_esk2)) return 0.0f;
      uint32_t elapsed = (millis() - id(g_letzter_endstatus_millis)) / 1000;
      uint32_t schwelle = (uint32_t) id(stoer_esk1_sek).state;
      if (elapsed >= schwelle) return 0.0f;
      return (float)(schwelle - elapsed);
    filters:
      - filter_out: nan
    web_server: { sorting_group_id: grp_stoer, sorting_weight: 5 }

text_sensor:
  # ── Status-Punkte je Kanal (sorting_weight: 0) ──
  - platform: template
    name: "Ch1 — Relais"
    id: st_r1
    web_server: { sorting_group_id: grp_ch1, sorting_weight: 0 }

  - platform: template
    name: "Ch2 — Relais"
    id: st_r2
    web_server: { sorting_group_id: grp_ch2, sorting_weight: 0 }

  - platform: template
    name: "Ch3 — Relais"
    id: st_r3
    web_server: { sorting_group_id: grp_ch3, sorting_weight: 0 }

  - platform: template
    name: "Ch4 — Relais"
    id: st_r4
    web_server: { sorting_group_id: grp_ch4, sorting_weight: 0 }

  # ── LED-Status (r5 blau, r6 rot) ──────────────────────────────
  - platform: template
    name: "LED blau (F7)"
    id: st_r5
    web_server: { sorting_group_id: grp_led, sorting_weight: 0 }
  - platform: template
    name: "LED rot (F8)"
    id: st_r6
    web_server: { sorting_group_id: grp_led, sorting_weight: 2 }

  # ── Diagnose ───────────────────────────────────────────────────
  - platform: version
    name: "ESPHome-Version"
    web_server: { sorting_group_id: grp_diag, sorting_weight: 6 }

  - platform: ethernet_info
    ip_address:
      name: "IP-Adresse"
      web_server: { sorting_group_id: grp_diag, sorting_weight: 4 }
    mac_address:
      name: "MAC-Adresse"
      web_server: { sorting_group_id: grp_diag, sorting_weight: 5 }

